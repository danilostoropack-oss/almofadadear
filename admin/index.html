<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Almofada de Ar</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0f1e;color:#e2e8f0;min-height:100vh;}
    .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
    .login-box{background:#0f1e3d;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:40px 36px;width:100%;max-width:380px;}
    .login-box h1{font-size:1.3rem;font-weight:800;color:#fff;margin-bottom:6px;}
    .login-box p{font-size:.85rem;color:rgba(255,255,255,.45);margin-bottom:28px;}
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:.78rem;font-weight:700;color:rgba(255,255,255,.55);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px;}
    .field input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:12px 14px;color:#fff;font-size:.93rem;outline:none;transition:border .2s;}
    .field input:focus{border-color:#1a56db;}
    .btn-login{width:100%;background:#1a56db;color:#fff;border:none;border-radius:9px;padding:13px;font-weight:700;font-size:.95rem;cursor:pointer;transition:background .2s;}
    .btn-login:hover{background:#2563eb;}
    .err{color:#f87171;font-size:.82rem;margin-top:10px;display:none;}
    .admin-panel{display:none;padding:32px 24px;max-width:1100px;margin:0 auto;}
    .admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px;}
    .admin-header h1{font-size:1.4rem;font-weight:900;color:#fff;}
    .admin-header h1 em{color:#7eb3ff;font-style:normal;}
    .btn-logout{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);padding:8px 18px;border-radius:8px;font-size:.82rem;cursor:pointer;}
    .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px;}
    .stat-box{background:#0f1e3d;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:20px;}
    .stat-box .n{font-size:1.8rem;font-weight:900;color:#fff;}
    .stat-box .l{font-size:.75rem;color:rgba(255,255,255,.45);margin-top:4px;}
    .capture-form{background:#0f1e3d;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:24px;margin-bottom:28px;}
    .capture-form h3{font-size:.97rem;font-weight:800;color:#fff;margin-bottom:16px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:end;}
    .form-row .field{margin:0;}
    .btn-add{background:#1a56db;color:#fff;border:none;border-radius:8px;padding:12px 20px;font-weight:700;font-size:.85rem;cursor:pointer;}
    .section-title{font-size:.72rem;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;}
    .leads-wrap{background:#0f1e3d;border:1px solid rgba(255,255,255,.1);border-radius:14px;overflow:hidden;}
    .leads-wrap table{width:100%;border-collapse:collapse;}
    .leads-wrap th{background:rgba(26,86,219,.35);color:#fff;padding:12px 16px;font-size:.75rem;font-weight:800;text-align:left;}
    .leads-wrap td{padding:12px 16px;font-size:.84rem;color:rgba(255,255,255,.75);border-bottom:1px solid rgba(255,255,255,.06);}
    .leads-wrap tr:last-child td{border-bottom:none;}
    .badge{display:inline-block;padding:2px 10px;border-radius:100px;font-size:.68rem;font-weight:700;}
    .badge-wa{background:rgba(34,197,94,.2);color:#4ade80;}
    .badge-form{background:rgba(26,86,219,.25);color:#7eb3ff;}
    .badge-cta{background:rgba(251,191,36,.2);color:#fbbf24;}
    .empty{text-align:center;padding:40px;color:rgba(255,255,255,.25);font-size:.9rem;}
    .btn-clear{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.25);color:#f87171;padding:8px 16px;border-radius:8px;font-size:.78rem;cursor:pointer;}
    .btn-export{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:#34d399;padding:8px 16px;border-radius:8px;font-size:.78rem;cursor:pointer;}
    @media(max-width:640px){.form-row{grid-template-columns:1fr 1fr;}.form-row .btn-add{grid-column:span 2;}}
  </style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>&#128274; Area Admin</h1>
    <p>Almofada de Ar - Painel de contatos</p>
    <div class="field"><label>Senha</label><input type="password" id="pwdInput" placeholder="Digite a senha" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-login" onclick="doLogin()">Entrar</button>
    <div class="err" id="loginErr">Senha incorreta.</div>
  </div>
</div>
<div class="admin-panel" id="adminPanel">
  <div class="admin-header">
    <h1>Painel de <em>Contatos</em></h1>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn-export" onclick="exportCSV()">&#8593; Exportar CSV</button>
      <button class="btn-clear" onclick="clearLeads()">&#128465; Limpar tudo</button>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="stats-row" id="statsRow"></div>
  <div class="capture-form">
    <h3>+ Adicionar contato manualmente</h3>
    <div class="form-row">
      <div class="field"><label>Nome</label><input type="text" id="fNome" placeholder="Nome completo"></div>
      <div class="field"><label>WhatsApp / Telefone</label><input type="text" id="fPhone" placeholder="(11) 99999-9999"></div>
      <div class="field"><label>Empresa</label><input type="text" id="fEmpresa" placeholder="Nome da empresa"></div>
      <button class="btn-add" onclick="addLead()">Salvar</button>
    </div>
  </div>
  <div class="section-title">Todos os contatos</div>
  <div class="leads-wrap">
    <table>
      <thead><tr><th>#</th><th>Data</th><th>Nome</th><th>WhatsApp/Tel</th><th>Empresa</th><th>Origem</th></tr></thead>
      <tbody id="leadsBody"></tbody>
    </table>
  </div>
</div>
<script>
var SENHA='almofada2026';
var KEY='almofada_leads';
function doLogin(){
  if(document.getElementById('pwdInput').value===SENHA){
    sessionStorage.setItem('admin_ok','1');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminPanel').style.display='block';
    renderLeads();
  } else {
    document.getElementById('loginErr').style.display='block';
  }
}
function doLogout(){sessionStorage.removeItem('admin_ok');location.reload();}
function getLeads(){return JSON.parse(localStorage.getItem(KEY)||'[]');}
function saveLeads(l){localStorage.setItem(KEY,JSON.stringify(l));}
function addLead(){
  var n=document.getElementById('fNome').value.trim();
  var p=document.getElementById('fPhone').value.trim();
  var e=document.getElementById('fEmpresa').value.trim();
  if(!n&&!p){alert('Preencha ao menos Nome ou Telefone.');return;}
  var leads=getLeads();
  leads.unshift({ts:new Date().toISOString(),nome:n,phone:p,empresa:e,source:'manual'});
  saveLeads(leads);
  document.getElementById('fNome').value='';
  document.getElementById('fPhone').value='';
  document.getElementById('fEmpresa').value='';
  renderLeads();
}
function clearLeads(){
  if(confirm('Apagar todos os contatos?')){localStorage.removeItem(KEY);renderLeads();}
}
function exportCSV(){
  var leads=getLeads();
  if(!leads.length){alert('Nenhum contato.');return;}
  var rows=[['#','Data','Nome','WhatsApp/Tel','Empresa','Origem']];
  leads.forEach(function(l,i){
    rows.push([i+1,new Date(l.ts).toLocaleString('pt-BR'),l.nome||'',l.phone||'',l.empresa||'',l.source||'']);
  });
  var csv=rows.map(function(r){return r.map(function(c){return '"'+(c+'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);
  a.download='contatos-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
function sourceBadge(s){
  if(!s||s==='manual')return '<span class="badge badge-form">'+(s||'direto')+'</span>';
  if(s.includes('wa'))return '<span class="badge badge-wa">WhatsApp</span>';
  if(s.includes('cta'))return '<span class="badge badge-cta">CTA</span>';
  return '<span class="badge badge-form">'+s+'</span>';
}
function renderLeads(){
  var leads=getLeads();
  var today=new Date().toDateString();
  document.getElementById('statsRow').innerHTML=[
    {n:leads.length,l:'Total de contatos'},
    {n:leads.filter(function(l){return (l.source||'').includes('wa');}).length,l:'Via WhatsApp'},
    {n:leads.filter(function(l){return l.source==='manual';}).length,l:'Adicionados manual'},
    {n:leads.filter(function(l){return new Date(l.ts).toDateString()===today;}).length,l:'Hoje'},
  ].map(function(s){return '<div class="stat-box"><div class="n">'+s.n+'</div><div class="l">'+s.l+'</div></div>';}).join('');
  var tbody=document.getElementById('leadsBody');
  if(!leads.length){
    tbody.innerHTML='<tr><td colspan="6" class="empty">Nenhum contato ainda.<br>Cliques no WhatsApp e CTAs sao registrados automaticamente.</td></tr>';
    return;
  }
  tbody.innerHTML=leads.map(function(l,i){
    var d=new Date(l.ts);
    var ds=d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    return '<tr><td style="color:rgba(255,255,255,.3)">'+(i+1)+'</td><td>'+ds+'</td><td style="color:#fff;font-weight:600">'+(l.nome||'—')+'</td><td>'+(l.phone||'—')+'</td><td>'+(l.empresa||'—')+'</td><td>'+sourceBadge(l.source)+'</td></tr>';
  }).join('');
}
if(sessionStorage.getItem('admin_ok')==='1'){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminPanel').style.display='block';
  renderLeads();
}
</script>
</body>
</html>
